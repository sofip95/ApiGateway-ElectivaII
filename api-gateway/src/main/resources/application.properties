server.port=8012

spring.application.name=farmasync-gateway

spring.cloud.gateway.routes[0].id=usuarios-service
spring.cloud.gateway.routes[0].uri=http://localhost:8013
spring.cloud.gateway.routes[0].predicates[0]=Path=/farmasync/usuarios/**

spring.cloud.gateway.routes[1].id=pedidos-service
spring.cloud.gateway.routes[1].uri=http://localhost:8014
spring.cloud.gateway.routes[1].predicates[0]=Path=/farmasync/pedidos/**

spring.cloud.gateway.routes[2].id=ventas-service
spring.cloud.gateway.routes[2].uri=http://localhost:8015
spring.cloud.gateway.routes[2].predicates[0]=Path=/farmasync/ventas/**

spring.cloud.gateway.routes[3].id=inventario-service
spring.cloud.gateway.routes[3].uri=http://localhost:8016
spring.cloud.gateway.routes[3].predicates[0]=Path=/farmasync/inventario/**

management.endpoints.web.exposure.include=health,gateway,info,metrics
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.boot.actuate=INFO

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html